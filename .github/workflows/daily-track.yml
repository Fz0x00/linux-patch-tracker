name: Daily Patch Tracking

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      skip_upstream:
        description: 'Skip upstream kernel.org resolution'
        type: boolean
        default: false
      no_issues:
        description: 'Skip GitHub Issue creation'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: tracker
        run: |
          pip install -r requirements.txt

      - name: Run tracker
        working-directory: tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m src.main \
            --config config.yaml \
            --output data \
            ${{ inputs.skip_upstream == true && '--skip-upstream' || '' }} \
            ${{ inputs.no_issues == true && '--no-issues' || '' }} \
            --log-level INFO

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add generated data
          git add tracker/data/*.json tracker/data/*.csv tracker/data/*.md || true

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily patch tracking update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: tracker/data

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
