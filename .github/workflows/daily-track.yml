name: Daily Patch Tracking

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      skip_upstream:
        description: 'Skip upstream kernel.org resolution'
        type: boolean
        default: false
      no_issues:
        description: 'Skip GitHub Issue creation'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m src.main \
            --config config.yaml \
            --output data \
            ${{ inputs.skip_upstream == true && '--skip-upstream' || '' }} \
            ${{ inputs.no_issues == true && '--no-issues' || '' }} \
            --log-level INFO

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/*.csv data/*.md || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily patch tracking update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: data

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        environment:
          name: github-pages
          url: ${{ steps.deployment.outputs.page_url }}
        uses: actions/deploy-pages@v4
