<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux 内核补丁时效追踪</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); margin-bottom: 24px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .stat-value { font-size: 32px; font-weight: 700; }
        .stat-label { color: var(--text-muted); font-size: 14px; }
        .stat-card.green .stat-value { color: var(--green); }
        .stat-card.yellow .stat-value { color: var(--yellow); }
        .stat-card.red .stat-value { color: var(--red); }
        .stat-card.blue .stat-value { color: var(--accent); }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        th {
            background: #21262d;
            font-weight: 600;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }
        tr:hover { background: #1c2128; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-fixed { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-pending { background: rgba(210,153,34,0.15); color: var(--yellow); }
        .badge-na { background: rgba(139,148,158,0.15); color: var(--text-muted); }
        .badge-unknown { background: rgba(248,81,73,0.15); color: var(--red); }
        .delay-fast { color: var(--green); font-weight: 600; }
        .delay-slow { color: var(--red); font-weight: 600; }
        .delay-ok { color: var(--text-muted); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .section { margin-bottom: 32px; }
        .section-title { font-size: 20px; margin-bottom: 12px; }
        .generated { color: var(--text-muted); font-size: 12px; margin-top: 40px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Linux 内核补丁时效追踪</h1>
    <p class="subtitle">监控主流公有云 Linux 发行版对上游 kernel.org 漏洞修复的响应速度</p>

    <div class="stats">
        <div class="stat-card blue">
            <div class="stat-value">0</div>
            <div class="stat-label">追踪 CVE</div>
        </div>
        <div class="stat-card green">
            <div class="stat-value">0</div>
            <div class="stat-label">已修复</div>
        </div>
        <div class="stat-card yellow">
            <div class="stat-value">0</div>
            <div class="stat-label">待修复</div>
        </div>
        <div class="stat-card red">
            <div class="stat-value">0</div>
            <div class="stat-label">严重延迟 (>30d)</div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">补丁延迟矩阵</h2>
        <table>
            <thead>
                <tr>
                    <th>CVE</th>
                    
                </tr>
            </thead>
            <tbody>
                
            </tbody>
        </table>
    </div>

    

    <p class="generated">Generated at 2026-07-01 14:21 UTC by linux-kernel-patch-tracker</p>
</div>
</body>
</html>
